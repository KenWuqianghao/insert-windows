name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained app
        run: >
          dotnet publish Insert.Windows/Insert.Windows.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output publish/win-x64

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $version = $env:RELEASE_TAG.TrimStart("v")
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" "/DVERSION=$version" installer\Insert.nsi

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Insert ${{ env.RELEASE_TAG }}
          files: artifacts/Insert-Windows-Setup-*.exe
          generate_release_notes: true
